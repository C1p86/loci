<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace">
  <rect width="480" height="200" rx="24" fill="#16181d"/>
  <!-- terminal window -->
  <rect x="36" y="44" width="408" height="112" rx="14" fill="#0d0e12" stroke="#2a2d36" stroke-width="2"/>
  <!-- title dots -->
  <circle cx="60" cy="68" r="5" fill="#ff5f56"/>
  <circle cx="78" cy="68" r="5" fill="#ffbd2e"/>
  <circle cx="96" cy="68" r="5" fill="#27c93f"/>
  <line x1="36" y1="84" x2="444" y2="84" stroke="#2a2d36" stroke-width="2"/>
  <!-- prompt -->
  <text x="62" y="128" font-size="44" font-weight="700" fill="#e6e8ec">
    <tspan fill="#27c93f">&gt;_</tspan> x<tspan fill="#27c93f">ci</tspan>
  </text>
  <!-- blinking cursor block -->
  <rect x="232" y="100" width="20" height="34" fill="#27c93f"/>
</svg>
