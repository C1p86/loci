name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # No explicit version input - reads from packageManager field in root package.json (pnpm@10.33.0)

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + Lint + Build + Test (turbo pipeline)
        run: pnpm turbo run typecheck lint build test --filter=xci --filter=@xci/server --filter=@xci/web

      - name: Smoke check - xci --version
        run: node packages/xci/dist/cli.mjs --version

  fence-gates:
    # Linux-only job that enforces the ws-exclusion grep (D-16b) and cold-start gate (D-17).
    # Runs in parallel with build-test-lint. Both jobs MUST be required checks on main branch.
    # NOTE: size-limit gate (D-15) is intentionally omitted from this workflow - see 06-05-SUMMARY.md
    # for rationale (real bundle baseline 760KB exceeds original 200KB target; gate deferred).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build xci (fresh, for accurate measurement)
        run: pnpm --filter xci build

      - name: Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine

      - name: Cold-start gate (D-17) - xci --version mean under 300ms on Linux
        run: |
          hyperfine --runs 10 --warmup 3 \
            --export-json hyperfine.json \
            'node packages/xci/dist/cli.mjs --version'
          node -e "
            const r = require('./hyperfine.json');
            const meanMs = r.results[0].mean * 1000;
            console.log('Mean cold-start:', meanMs.toFixed(1) + 'ms');
            if (meanMs >= 300) {
              console.error('FAIL: mean ' + meanMs.toFixed(1) + 'ms >= 300ms budget');
              process.exit(1);
            }
            console.log('PASS: under 300ms budget');
          "

      - name: Upload hyperfine JSON artifact (for post-mortem)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hyperfine-results
          path: hyperfine.json

  web-e2e:
    # Linux-only Playwright smoke — runs after build-test-lint matrix passes.
    # Spins up a real Postgres + @xci/server + vite preview and executes the smoke spec.
    # Artifact retention: failure screenshots only, 7 days.
    needs: [build-test-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @xci/web exec playwright install --with-deps chromium

      - name: Build server and web
        run: pnpm turbo run build --filter=@xci/server --filter=@xci/web

      - name: Start postgres
        run: |
          docker run -d --name xci-pg \
            -e POSTGRES_PASSWORD=xci \
            -e POSTGRES_USER=xci \
            -e POSTGRES_DB=xci \
            -p 5432:5432 \
            postgres:16
          for i in {1..30}; do docker exec xci-pg pg_isready -U xci && break; sleep 1; done

      - name: Start server in background
        env:
          DATABASE_URL: postgres://xci:xci@localhost:5432/xci
          XCI_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          SESSION_COOKIE_SECRET: test-session-secret-32-bytes-minimum-xx
          EMAIL_TRANSPORT: stub
          PORT: '3000'
          NODE_ENV: test
        run: |
          node packages/server/dist/server.js &
          echo $! > /tmp/server.pid
          for i in {1..30}; do curl -sf http://localhost:3000/api/healthz && break; sleep 1; done

      - name: Start vite preview in background
        run: |
          pnpm --filter @xci/web exec vite preview --port 5173 --strictPort --host &
          echo $! > /tmp/web.pid
          for i in {1..20}; do curl -sf http://localhost:5173 && break; sleep 1; done

      - name: Playwright smoke
        run: pnpm --filter @xci/web exec playwright test

      - name: Stop background processes
        if: always()
        run: |
          [ -f /tmp/server.pid ] && kill $(cat /tmp/server.pid) || true
          [ -f /tmp/web.pid ]    && kill $(cat /tmp/web.pid)    || true
          docker rm -f xci-pg || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7

  integration-tests:
    # Linux-only (D-23) — testcontainers needs Docker, preinstalled on ubuntu-latest.
    # Gates on build-test-lint matrix passing first (no point running integration if unit/build is broken).
    needs: [build-test-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @xci/server
        run: pnpm --filter @xci/server build

      - name: Run integration suite (testcontainers Postgres 16-alpine)
        run: pnpm --filter @xci/server test:integration
        # First run: ~30-45s container pull + boot + full suite
        # Subsequent runs: ~15-20s (Docker layer cache on ubuntu-latest is ephemeral between jobs,
        # but postgres:16-alpine image is usually cached at the runner host level)

      - name: Upload vitest results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-integration-results
          path: packages/server/.vitest-output/
          if-no-files-found: ignore
          retention-days: 7
